map $http_upgrade $phd_atlas_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name phd.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name phd.example.com;

    ssl_certificate /etc/letsencrypt/live/phd.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phd.example.com/privkey.pem;

    # The authenticated batch-upload contract permits up to 20 × 25 MiB files
    # in one multipart request. Keep a small allowance for multipart metadata.
    client_max_body_size 550m;

    location / {
        proxy_pass http://127.0.0.1:4317;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $phd_atlas_connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }
}
