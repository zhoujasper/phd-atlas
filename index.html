<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-48x48.png" type="image/png" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0071e3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PhD Atlas" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="description"
      content="PhD Atlas: a responsive application management workspace for PhD applicants."
    />
    <title>PhD Atlas</title>
    <script src="/boot-theme.js"></script>
    <style>
      :root {
        color-scheme: light;
        --boot-canvas: #f5f5f7;
        --boot-surface: #fff;
        --boot-surface-secondary: #f7f7f9;
        --boot-border: rgba(0, 0, 0, 0.06);
        --boot-accent: #0071e3;
        --boot-rail: rgba(20, 20, 22, 0.96);
      }

      html[data-boot-theme="dark"] {
        color-scheme: dark;
        --boot-canvas: #111114;
        --boot-surface: #1c1c1e;
        --boot-surface-secondary: #242426;
        --boot-border: rgba(255, 255, 255, 0.09);
        --boot-rail: rgba(0, 0, 0, 0.9);
      }

      html,
      body,
      #root {
        min-height: 100vh;
      }

      body {
        margin: 0;
        background: var(--boot-canvas);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }

      .boot-launch-screen {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background: var(--boot-canvas);
      }

      .boot-launch-screen > .launch-app-shell,
      .boot-launch-screen > .launch-auth-shell,
      .boot-launch-screen > .launch-standalone-shell,
      .boot-launch-screen > .launch-admin-shell {
        display: none;
      }

      .boot-launch-screen.launch-variant-dashboard > .launch-app-shell,
      .boot-launch-screen.launch-variant-workspace > .launch-app-shell,
      .boot-launch-screen.launch-variant-profile > .launch-app-shell,
      .boot-launch-screen.launch-variant-settings > .launch-app-shell,
      .boot-launch-screen.launch-variant-team > .launch-app-shell {
        display: grid;
      }

      .boot-launch-screen.launch-variant-auth > .launch-auth-shell,
      .boot-launch-screen.launch-variant-standalone > .launch-standalone-shell,
      .boot-launch-screen.launch-variant-admin > .launch-admin-shell {
        display: grid;
      }

      .boot-launch-screen .launch-app-shell {
        height: 100vh;
        grid-template-columns: 72px minmax(0, 1fr);
      }

      .boot-launch-screen.launch-variant-workspace .launch-app-shell {
        grid-template-columns: 72px 340px minmax(0, 1fr) 304px;
      }

      .boot-launch-screen .launch-rail {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 18px 10px 14px;
        background: var(--boot-rail);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
      }

      .boot-launch-screen .launch-rail-mark {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
      }

      .boot-launch-screen .launch-rail-nav {
        flex: 1;
        display: grid;
        align-content: start;
        gap: 10px;
        padding-top: 6px;
      }

      .boot-launch-screen .launch-rail-nav span,
      .boot-launch-screen .launch-rail-bottom span {
        display: block;
        width: 34px;
        height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.05);
      }

      .boot-launch-screen .launch-rail-nav span:first-child {
        background: rgba(255, 255, 255, 0.15);
      }

      .boot-launch-screen .launch-rail-bottom {
        display: grid;
        gap: 10px;
      }

      .boot-launch-screen .launch-main-stage,
      .boot-launch-screen .screen-skeleton,
      .boot-launch-screen .pane-skeleton {
        min-width: 0;
        min-height: 0;
      }

      .boot-launch-screen .screen-skeleton {
        height: 100%;
        display: grid;
        align-content: start;
        gap: 16px;
        padding: 28px 34px;
        background: var(--boot-canvas);
      }

      .boot-launch-screen .pane-skeleton {
        height: 100vh;
        display: grid;
        align-content: start;
        gap: 14px;
        padding: 18px 14px;
        background: var(--boot-surface-secondary);
      }

      .boot-launch-screen:not(.launch-variant-workspace) .boot-application-pane,
      .boot-launch-screen:not(.launch-variant-workspace) .boot-inspector-pane {
        display: none;
      }

      .boot-launch-screen .boot-application-pane { border-right: 1px solid var(--boot-border); }
      .boot-launch-screen .boot-inspector-pane { border-left: 1px solid var(--boot-border); }

      .boot-launch-screen .loading-skeleton-bar,
      .boot-launch-screen .screen-skeleton-action,
      .boot-launch-screen .screen-skeleton-stat,
      .boot-launch-screen .loading-skeleton-card,
      .boot-launch-screen .pane-skeleton-search,
      .boot-launch-screen .pane-skeleton-row,
      .boot-launch-screen .pane-skeleton-ring,
      .boot-launch-screen .launch-auth-input,
      .boot-launch-screen .launch-auth-button,
      .boot-launch-screen .launch-auth-mark,
      .boot-launch-screen .launch-standalone-mark,
      .boot-launch-screen .launch-admin-brand,
      .boot-launch-screen .launch-admin-tab,
      .boot-launch-screen .launch-admin-account {
        background: linear-gradient(100deg, var(--boot-surface-secondary) 8%, var(--boot-surface) 34%, var(--boot-surface-secondary) 58%);
        background-size: 240% 100%;
        animation: boot-shimmer 1.55s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }

      .boot-launch-screen .loading-skeleton-bar {
        display: block;
        width: 100%;
        height: 12px;
        border-radius: 999px;
      }

      .boot-launch-screen .loading-skeleton-bar.medium { width: 72%; }
      .boot-launch-screen .loading-skeleton-bar.short { width: 46%; }
      .boot-launch-screen .loading-skeleton-bar.tiny { width: 28%; }

      .boot-launch-screen .screen-skeleton-hero {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--boot-border);
      }

      .boot-launch-screen .screen-skeleton-heading {
        width: min(460px, 72%);
        display: grid;
        gap: 8px;
      }

      .boot-launch-screen .screen-skeleton-heading .short { height: 22px; }

      .boot-launch-screen .screen-skeleton-action {
        width: 116px;
        height: 36px;
        border-radius: 8px;
      }

      .boot-launch-screen .screen-skeleton-stats,
      .boot-launch-screen .screen-skeleton-content {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .boot-launch-screen .screen-skeleton-content {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .boot-launch-screen .screen-skeleton-stat,
      .boot-launch-screen .loading-skeleton-card {
        min-height: 78px;
        padding: 12px;
        border: 1px solid var(--boot-border);
        border-radius: 8px;
        background-color: var(--boot-surface);
      }

      .boot-launch-screen .loading-skeleton-card {
        min-height: 160px;
        display: grid;
        align-content: start;
        gap: 12px;
        padding: 16px;
        border-radius: 12px;
        background-image: none;
        animation: none;
      }

      .boot-launch-screen .pane-skeleton-heading,
      .boot-launch-screen .pane-skeleton-row > div {
        display: grid;
        gap: 8px;
      }

      .boot-launch-screen .pane-skeleton-search {
        height: 36px;
        border-radius: 8px;
      }

      .boot-launch-screen .pane-skeleton-list {
        display: grid;
        gap: 8px;
      }

      .boot-launch-screen .pane-skeleton-row {
        min-height: 62px;
        padding: 10px;
        border: 1px solid var(--boot-border);
        border-radius: 8px;
        background-color: var(--boot-surface);
      }

      .boot-launch-screen .pane-skeleton-ring {
        width: 76px;
        height: 76px;
        justify-self: center;
        margin: 12px 0;
        border-radius: 50%;
      }

      .boot-launch-screen .launch-auth-shell {
        width: min(920px, calc(100vw - 48px));
        min-height: min(570px, calc(100vh - 64px));
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin: 32px auto;
        border: 1px solid var(--boot-border);
        border-radius: 16px;
        background: var(--boot-surface);
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
      }

      .boot-launch-screen .launch-auth-hero,
      .boot-launch-screen .launch-auth-form {
        display: grid;
        align-content: center;
        gap: 14px;
        padding: 48px 40px;
      }

      .boot-launch-screen .launch-auth-hero {
        background: linear-gradient(155deg, #2b9cff, #0058c6);
      }

      .boot-launch-screen .launch-auth-hero .loading-skeleton-bar,
      .boot-launch-screen .launch-auth-mark {
        background: rgba(255, 255, 255, 0.2);
        animation: none;
      }

      .boot-launch-screen .launch-auth-mark {
        width: 52px;
        height: 52px;
        border-radius: 10px;
      }

      .boot-launch-screen .launch-auth-input,
      .boot-launch-screen .launch-auth-button {
        height: 42px;
        border-radius: 8px;
      }

      .boot-launch-screen .launch-auth-button { background: var(--boot-accent); }

      .boot-launch-screen .launch-standalone-shell {
        width: min(720px, calc(100vw - 48px));
        align-content: start;
        gap: 16px;
        margin: 0 auto;
        padding: 32px 24px 48px;
      }

      .boot-launch-screen .launch-standalone-header {
        display: grid;
        gap: 10px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--boot-border);
      }

      .boot-launch-screen .launch-standalone-mark {
        width: 42px;
        height: 42px;
        border-radius: 8px;
      }

      .boot-launch-screen .launch-admin-shell {
        min-height: 100vh;
        grid-template-rows: 58px minmax(0, 1fr);
      }

      .boot-launch-screen .launch-admin-topbar {
        display: grid;
        grid-template-columns: 190px minmax(0, 1fr) 170px;
        align-items: center;
        gap: 18px;
        padding: 0 22px;
        border-bottom: 1px solid var(--boot-border);
        background: var(--boot-surface);
      }

      .boot-launch-screen .launch-admin-brand,
      .boot-launch-screen .launch-admin-account {
        width: 142px;
        height: 22px;
        border-radius: 999px;
      }

      .boot-launch-screen .launch-admin-account { justify-self: end; width: 128px; }

      .boot-launch-screen .launch-admin-tabs {
        display: flex;
        justify-content: center;
        gap: 12px;
      }

      .boot-launch-screen .launch-admin-tab {
        width: 92px;
        height: 34px;
        border-radius: 6px;
      }

      .boot-launch-screen .launch-admin-body {
        display: grid;
        align-content: start;
        gap: 16px;
        padding: 24px 28px;
      }

      @keyframes boot-shimmer {
        from { background-position: 180% 0; }
        to { background-position: -120% 0; }
      }

      @media (max-width: 820px) {
        .boot-launch-screen .launch-app-shell,
        .boot-launch-screen.launch-variant-workspace .launch-app-shell {
          grid-template-columns: minmax(0, 1fr);
          padding-bottom: 64px;
        }

        .boot-launch-screen .launch-rail {
          position: fixed;
          right: 0;
          bottom: 0;
          left: 0;
          z-index: 2;
          height: 64px;
          flex-direction: row;
          justify-content: center;
          padding: 8px 14px;
        }

        .boot-launch-screen .launch-rail-mark,
        .boot-launch-screen .launch-rail-bottom,
        .boot-launch-screen .boot-application-pane,
        .boot-launch-screen .boot-inspector-pane {
          display: none;
        }

        .boot-launch-screen .launch-rail-nav { display: flex; padding: 0; }
        .boot-launch-screen .screen-skeleton { padding: 22px 18px; }
        .boot-launch-screen .screen-skeleton-stats,
        .boot-launch-screen .screen-skeleton-content { grid-template-columns: 1fr; }
        .boot-launch-screen .screen-skeleton-stat:nth-child(n + 3) { display: none; }

        .boot-launch-screen .launch-auth-shell {
          width: min(520px, calc(100vw - 32px));
          min-height: 0;
          grid-template-columns: 1fr;
          margin: 24px auto;
        }

        .boot-launch-screen .launch-auth-hero { min-height: 180px; padding: 28px 24px; }
        .boot-launch-screen .launch-auth-form { padding: 28px 24px; }
        .boot-launch-screen .launch-admin-topbar { grid-template-columns: minmax(0, 1fr) auto; }
        .boot-launch-screen .launch-admin-tabs { display: none; }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-launch-screen * { animation-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-screen" class="launch-screen boot-launch-screen" aria-busy="true" aria-label="PhD Atlas">
        <div class="launch-app-shell">
          <aside class="launch-rail" aria-hidden="true">
            <span class="launch-rail-mark"></span>
            <div class="launch-rail-nav"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="launch-rail-bottom"><span></span><span></span></div>
          </aside>
          <aside class="pane-skeleton boot-application-pane" aria-hidden="true">
            <div class="pane-skeleton-heading"><span class="loading-skeleton-bar tiny"></span><span class="loading-skeleton-bar medium"></span></div>
            <span class="pane-skeleton-search"></span>
            <div class="pane-skeleton-list">
              <div class="pane-skeleton-row"><div><span class="loading-skeleton-bar medium"></span><span class="loading-skeleton-bar short"></span></div></div>
              <div class="pane-skeleton-row"><div><span class="loading-skeleton-bar medium"></span><span class="loading-skeleton-bar short"></span></div></div>
              <div class="pane-skeleton-row"><div><span class="loading-skeleton-bar medium"></span><span class="loading-skeleton-bar short"></span></div></div>
              <div class="pane-skeleton-row"><div><span class="loading-skeleton-bar medium"></span><span class="loading-skeleton-bar short"></span></div></div>
            </div>
          </aside>
          <main class="launch-main-stage" aria-hidden="true">
            <div class="screen-skeleton">
              <div class="screen-skeleton-hero">
                <div class="screen-skeleton-heading"><span class="loading-skeleton-bar tiny"></span><span class="loading-skeleton-bar short"></span><span class="loading-skeleton-bar medium"></span></div>
                <span class="screen-skeleton-action"></span>
              </div>
              <div class="screen-skeleton-stats">
                <span class="screen-skeleton-stat"></span><span class="screen-skeleton-stat"></span><span class="screen-skeleton-stat"></span><span class="screen-skeleton-stat"></span>
              </div>
              <div class="screen-skeleton-content">
                <div class="loading-skeleton-card"><span class="loading-skeleton-bar short"></span><span class="loading-skeleton-bar"></span><span class="loading-skeleton-bar medium"></span></div>
                <div class="loading-skeleton-card"><span class="loading-skeleton-bar short"></span><span class="loading-skeleton-bar"></span><span class="loading-skeleton-bar medium"></span></div>
              </div>
            </div>
          </main>
          <aside class="pane-skeleton boot-inspector-pane" aria-hidden="true">
            <div class="pane-skeleton-heading"><span class="loading-skeleton-bar tiny"></span><span class="loading-skeleton-bar medium"></span></div>
            <span class="pane-skeleton-ring"></span>
            <div class="loading-skeleton-card"><span class="loading-skeleton-bar short"></span><span class="loading-skeleton-bar"></span><span class="loading-skeleton-bar medium"></span></div>
          </aside>
        </div>

        <div class="launch-auth-shell" aria-hidden="true">
          <div class="launch-auth-hero"><span class="launch-auth-mark"></span><span class="loading-skeleton-bar medium"></span><span class="loading-skeleton-bar"></span><span class="loading-skeleton-bar medium"></span></div>
          <div class="launch-auth-form"><span class="loading-skeleton-bar tiny"></span><span class="loading-skeleton-bar medium"></span><span class="loading-skeleton-bar"></span><span class="launch-auth-input"></span><span class="launch-auth-input"></span><span class="launch-auth-button"></span></div>
        </div>

        <div class="launch-standalone-shell" aria-hidden="true">
          <div class="launch-standalone-header"><span class="launch-standalone-mark"></span><span class="loading-skeleton-bar short"></span><span class="loading-skeleton-bar medium"></span></div>
          <div class="loading-skeleton-card"><span class="loading-skeleton-bar short"></span><span class="loading-skeleton-bar"></span><span class="loading-skeleton-bar medium"></span></div>
          <div class="loading-skeleton-card"><span class="loading-skeleton-bar short"></span><span class="loading-skeleton-bar"></span></div>
        </div>

        <div class="launch-admin-shell" aria-hidden="true">
          <div class="launch-admin-topbar"><span class="launch-admin-brand"></span><div class="launch-admin-tabs"><span class="launch-admin-tab"></span><span class="launch-admin-tab"></span><span class="launch-admin-tab"></span><span class="launch-admin-tab"></span></div><span class="launch-admin-account"></span></div>
          <div class="launch-admin-body"><div class="screen-skeleton-stats"><span class="screen-skeleton-stat"></span><span class="screen-skeleton-stat"></span><span class="screen-skeleton-stat"></span><span class="screen-skeleton-stat"></span></div><div class="screen-skeleton-content"><div class="loading-skeleton-card"></div><div class="loading-skeleton-card"></div></div></div>
        </div>
      </div>
    </div>
    <script src="/boot-variant.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
