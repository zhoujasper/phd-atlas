services:
  phd-atlas:
    image: ${PHD_ATLAS_IMAGE:-ghcr.io/zhoujasper/phd-atlas-source:beta}
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4317
    ports:
      - "127.0.0.1:${APP_PORT:-4317}:4317"
    volumes:
      - phd-atlas-data:/app/storage
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  phd-atlas-data:
